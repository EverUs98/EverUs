      <p>${month.text.replace(/\n/g,"<br>")}</p>
      <div class="month-images">
        ${month.images.map(img => `<img src="${img}" alt="Foto del mes" style="width:100%; max-width:400px; margin-bottom:10px;">`).join('')}
      </div>
      ${month.pdf ? `<a href="${month.pdf}" download class="btn-month" style="display:inline-block;margin-top:10px;">📥 Descargar PDF</a>` : ""}
      `;

 <script>
  // 🔊 Reproducción automática SOLO en el mes 3
  const urlParams2 = new URLSearchParams(window.location.search);
  const mes2 = urlParams2.get('mes');

  if (mes2 === "3") {

    // Esperamos a que el contenido dinámico se haya insertado
    setTimeout(() => {
      const audio = document.getElementById("audio309");
      audio.play();
      if (!audio) return;

      const startSong = () => {
        audio.play().catch(() => {});
        document.removeEventListener("click", startSong);
        document.removeEventListener("touchstart", startSong);
      };

      // Autoplay requiere interacción del usuario (norma del navegador)
      document.addEventListener("click", startSong);
      document.addEventListener("touchstart", startSong);
    }, 300); // ⏳ 300 ms para que el audio exista en el DOM
  }
</script>
