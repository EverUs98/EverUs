if(mes === "8"){

contentDiv.innerHTML = `

// ==========================================
// 🌎 TRADUCTOR
// ==========================================

let translated = false;

const translateBtn =
document.getElementById("translateBtn");

const letterText =
document.getElementById("letterText");


translateBtn.addEventListener("click",()=>{

  translated = !translated;

  if(translated){

    letterText.innerHTML =
    texto8ES.replace(/\n/g,"<br>");

    translateBtn.innerHTML =
    "🌎 English";

  }else{

    letterText.innerHTML =
    texto8EN.replace(/\n/g,"<br>");

    translateBtn.innerHTML =
    "🌎 Traducir";

  }

});




// ==========================================
// ❤️ CORAZÓN
// ==========================================

const canvas =
document.getElementById("heartCanvas");

const ctx =
canvas.getContext("2d");


const solved =
localStorage.getItem("heartSolved");


const points = [

  {x:210,y:90},
  {x:300,y:50},
  {x:360,y:130},
  {x:360,y:220},
  {x:210,y:360},
  {x:60,y:220},
  {x:60,y:130},
  {x:120,y:50},
  {x:210,y:90}

];


let currentPoint = 0;



function drawHeart(completed = false){

  ctx.clearRect(0,0,420,420);


  // LINEAS
  if(currentPoint > 0){

    ctx.beginPath();

    ctx.moveTo(
      points[0].x,
      points[0].y
    );

    for(let i=1;i<=currentPoint;i++){

      ctx.lineTo(
        points[i].x,
        points[i].y
      );

    }

    ctx.strokeStyle =
    completed
    ? "#ff4fa3"
    : "#ffffff";

    ctx.lineWidth = 6;

    ctx.stroke();

  }


  // PUNTOS
  points.forEach((p,index)=>{

    ctx.beginPath();

    ctx.arc(
      p.x,
      p.y,
      10,
      0,
      Math.PI*2
    );

    ctx.fillStyle =
    index <= currentPoint
    ? "#ff4fa3"
    : "#ffffff";

    ctx.fill();

  });

}



// SI YA ESTÁ RESUELTO
if(solved){

  currentPoint =
  points.length - 1;

  drawHeart(true);

  document.getElementById("heartMessage")
  .innerHTML = `
    💖 Felices 8 meses mi amor 💖
    <br>
    Vamos por años juntos ✨
  `;

}else{

  drawHeart();

  canvas.addEventListener("click",(e)=>{

    const rect =
    canvas.getBoundingClientRect();

    const scaleX =
    canvas.width / rect.width;

    const scaleY =
    canvas.height / rect.height;

    const mouseX =
    (e.clientX - rect.left) * scaleX;

    const mouseY =
    (e.clientY - rect.top) * scaleY;

    const nextPoint =
    points[currentPoint + 1];

    if(!nextPoint) return;


    const distance =
    Math.sqrt(

      (mouseX - nextPoint.x) ** 2 +

      (mouseY - nextPoint.y) ** 2

    );


    if(distance < 28){

      currentPoint++;

      drawHeart();


      // TERMINADO
      if(currentPoint >= points.length - 1){

        drawHeart(true);

        localStorage.setItem(
          "heartSolved",
          "true"
        );

        document.getElementById("heartMessage")
        .innerHTML = `
          💖 Felices 8 meses mi amor 💖
          <br>
          Vamos por muchísimos más ✨
        `;

      }

    }

  });

}

}

    const startSong = ()=>{

      audio.play().catch(()=>{});

      document.removeEventListener(
        "click",
        startSong
      );

      document.removeEventListener(
        "touchstart",
        startSong
      );

    };

    document.addEventListener(
      "click",
      startSong
    );

    document.addEventListener(
      "touchstart",
      startSong
    );

  },300);

}
